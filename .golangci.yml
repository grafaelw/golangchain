# golangci-lint v2 configuration for golangchain
# https://golangci-lint.run/docs/product/migration-guide

version: "2"

run:
  timeout: 5m
  # Never modify go.mod/go.sum during a lint run.
  modules-download-mode: readonly

linters:
  enable:
    - govet          # go vet checks (shadowing, printf mismatches, …)
    - errcheck       # unhandled errors
    - staticcheck    # comprehensive static analysis (covers gosimple + unused in v2)
    - ineffassign    # assignments whose value is never used
    - misspell       # common typos in comments and strings
    - nolintlint     # malformed //nolint directives
    - godot          # exported doc comments should end with a period
    - revive         # general-purpose drop-in for golint

  disable:
    # Too opinionated / too noisy for this project:
    - depguard       # import allow/deny list
    - wrapcheck      # force errors.Wrap on every return
    - exhaustive     # exhaustive switch on enums
    - gomnd          # magic number detection
    - funlen         # function length limit
    - cyclop         # cyclomatic complexity (covered by staticcheck)
    - gocognit       # cognitive complexity
    - maintidx       # maintainability index

  settings:
    errcheck:
      # Type assertions in switch/if are fine without explicit checks.
      check-type-assertions: false
      # Explicitly blank-assigned errors (e.g. _ = rand.Read(b)) are intentional.
      check-blank: false

    godot:
      # Only enforce period on exported doc comments, not inline comments.
      scope: declarations
      exclude:
        - "^TODO"
        - "^FIXME"
        - "^NOTE"
        - "^nolint"

    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
            - "sayRepetitiveInsteadOfStutters"
        - name: unused-parameter
          disabled: true   # too noisy in interface implementations

    staticcheck:
      checks:
        - "all"
        - "-SA1019"   # suppress deprecated-API warnings

  exclusions:
    rules:
      # Test files get relaxed rules.
      - path: "_test\\.go$"
        linters:
          - errcheck
          - godot
          - revive

      # NoOpHandler stubs are intentional one-liners.
      - path: "callbacks/callbacks\\.go"
        text: "exported method.*should have comment"
        linters:
          - revive

# ---------------------------------------------------------------------------
# Formatters — separate from linters in golangci-lint v2
# goimports was reclassified as a formatter in v2 and must live here.
# ---------------------------------------------------------------------------
formatters:
  enable:
    - goimports      # import grouping: stdlib / external / internal

  settings:
    goimports:
      local-prefixes:
        - github.com/grafaelw/golangchain


